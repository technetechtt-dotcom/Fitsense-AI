services:
  - type: web
    name: fitsense-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: node -v && npm -v && npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      # Prefer 22 when available; Render static/native may still use 20.
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SYNC_STORE
        value: postgres
      - key: HANDOFF_STORE
        value: postgres
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "true"
      # Set manually to your static site URL, e.g. https://fitsense-web.onrender.com
      - key: CORS_ORIGIN
        sync: false
      - key: AUTH_SECRET
        sync: false

  - type: web
    name: fitsense-web
    runtime: static
    buildCommand: node -v && npm -v && npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_API_BASE_URL
        fromService:
          name: fitsense-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_ENABLE_DEMO_SCAN
        value: "false"
      - key: VITE_PRIVACY_CONTROLLER_NAME
        value: FitSense AI
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

services:
  - type: web
    name: fitsense-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SYNC_STORE
        value: postgres
      - key: HANDOFF_STORE
        value: postgres
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "true"
      - key: CORS_ORIGIN
        fromService:
          name: fitsense-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false

  - type: web
    name: fitsense-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE_URL
        fromService:
          name: fitsense-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: VITE_ENABLE_DEMO_SCAN
        value: "false"
      - key: VITE_PRIVACY_CONTROLLER_NAME
        value: FitSense AI
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web-and-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build:all

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: docker build -t fitsense-api:test .

  android-source-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f android/gradle/wrapper/gradle-wrapper.properties
      - run: test -f android/app/build.gradle.kts
